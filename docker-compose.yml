services:
  devin-bot:
    build: .
    container_name: devin-dependency-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - bot-data:/data
      - ../superset-frontend:/app/superset-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  bot-data:
    driver: local
